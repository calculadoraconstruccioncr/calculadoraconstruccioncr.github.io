name: Actualizar tasas de referencia

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 7 AM Costa Rica
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests --quiet

      - name: Obtener tasas y actualizar rates.json
        env:
          BCCR_TOKEN: ${{ secrets.BCCR_TOKEN }}
          BCCR_EMAIL: ${{ secrets.BCCR_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import requests, json, re, sys, time, os
          from datetime import datetime, timedelta, timezone
          from xml.etree import ElementTree as ET

          NOW = datetime.now(timezone.utc)
          TODAY = NOW.strftime('%d/%m/%Y')

          BCCR_TOKEN = os.environ.get('BCCR_TOKEN')
          BCCR_EMAIL = os.environ.get('BCCR_EMAIL')

          # 🔍 DEBUG SECRETS
          print("🔍 DEBUG SECRETS:")
          print("BCCR_TOKEN existe:", "YES" if BCCR_TOKEN else "NO")

          if BCCR_TOKEN:
              print("BCCR_TOKEN preview:", BCCR_TOKEN[:4] + "..." + BCCR_TOKEN[-4:])
          else:
              print("BCCR_TOKEN preview: NONE")

          print("BCCR_EMAIL:", BCCR_EMAIL if BCCR_EMAIL else "NONE")

          # Validación básica
          if not BCCR_TOKEN or len(BCCR_TOKEN) < 10:
              print("❌ TOKEN inválido o vacío", file=sys.stderr)
              sys.exit(1)

          if not BCCR_EMAIL or "@" not in BCCR_EMAIL:
              print("❌ EMAIL inválido", file=sys.stderr)
              sys.exit(1)

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36'
          }

          BCCR_URL = 'https://gee.bccr.fi.cr/Indicadores/Suscripciones/WS/wsindicadoreseconomicos.asmx/ObtenerIndicadoresEconomicosXML'

          def retry(fn, attempts=3):
              for i in range(attempts):
                  try:
                      return fn()
                  except Exception as e:
                      if i == attempts - 1:
                          raise
                      time.sleep(2)

          def bccr_fetch(indicator_code):
              def _call():
                  params = {
                      'Indicador': indicator_code,
                      'FechaInicio': TODAY,
                      'FechaFinal': TODAY,
                      'Nombre': BCCR_EMAIL,
                      'SubNiveles': 'N',
                      'CorreoElectronico': BCCR_EMAIL,
                      'Token': BCCR_TOKEN,
                  }
                  r = requests.get(BCCR_URL, params=params, headers=HEADERS, timeout=20)
                  r.raise_for_status()

                  root = ET.fromstring(r.text)
                  values = []

                  for elem in root.iter():
                      tag = elem.tag.split('}')[-1]
                      if tag == 'NUM_VALOR' and elem.text:
                          try:
                              v = float(elem.text.replace(',', '.').strip())
                              if v > 0:
                                  values.append(v)
                          except:
                              pass

                  if not values:
                      raise ValueError(f'Sin datos para indicador {indicator_code}')

                  return round(values[-1], 4)

              try:
                  return retry(_call)
              except Exception as e:
                  print(f'❌ BCCR {indicator_code} error: {e}', file=sys.stderr)
                  return None

          def fred_fetch(series_id):
              try:
                  url = f'https://fred.stlouisfed.org/graph/fredgraph.csv?id={series_id}'
                  r = requests.get(url, headers=HEADERS, timeout=20)
                  r.raise_for_status()

                  lines = [l.strip() for l in r.text.split('\n') if l.strip()]
                  for line in reversed(lines[1:]):
                      parts = line.split(',')
                      if len(parts) >= 2 and parts[1] not in ('.', ''):
                          v = float(parts[1])
                          if 0 < v < 30:
                              return round(v, 4)
              except Exception as e:
                  print(f'❌ FRED {series_id} error: {e}', file=sys.stderr)
              return None

          def camara_fetch(url):
              try:
                  r = requests.get(url, headers=HEADERS, timeout=20)
                  r.raise_for_status()
                  text = r.text.replace('\n', ' ')

                  def find_rate(pattern):
                      m = re.search(pattern, text, re.IGNORECASE)
                      if m:
                          return round(float(m.group(1).replace(',', '.')), 4)
                      return None

                  return {
                      'tri3':  find_rate(r'3\s*meses?[^%]{0,80}?(\d{1,2}[,.]\d+)'),
                      'tri6':  find_rate(r'6\s*meses?[^%]{0,80}?(\d{1,2}[,.]\d+)'),
                      'tri12': find_rate(r'12\s*meses?[^%]{0,80}?(\d{1,2}[,.]\d+)'),
                  }
              except Exception as e:
                  print(f'❌ Cámara error: {e}', file=sys.stderr)
                  return {'tri3': None, 'tri6': None, 'tri12': None}

          try:
              with open('rates.json') as f:
                  existing = json.load(f)
          except:
              existing = {}

          def use(new, key):
              if new:
                  return new
              old = existing.get(key)
              print(f'⚠ {key}: usando fallback {old}', file=sys.stderr)
              return old

          print('→ BCCR...')
          tbp = bccr_fetch(423)
          ted = bccr_fetch(23698)
          tc  = bccr_fetch(318)

          if tbp is None and ted is None and tc is None:
              print("❌ BCCR completamente falló", file=sys.stderr)
              sys.exit(1)

          print('→ FRED...')
          prime = fred_fetch('DPRIME')
          sofr3 = fred_fetch('SOFR90DAYAVG')
          sofr6 = fred_fetch('SOFR180DAYAVG')

          print('→ Cámara...')
          crc = camara_fetch('https://camaradebancos.fi.cr/colones/')
          usd = camara_fetch('https://camaradebancos.fi.cr/dolares/')

          rates = {
              'updated': NOW.strftime('%Y-%m-%dT%H:%M:%SZ'),
              'tbp': use(tbp, 'tbp'),
              'ted': use(ted, 'ted'),
              'tc': use(tc, 'tc'),
              'prime': use(prime, 'prime'),
              'sofr3': use(sofr3, 'sofr3'),
              'sofr6': use(sofr6, 'sofr6'),
              'tri3c': use(crc['tri3'], 'tri3c'),
              'tri6c': use(crc['tri6'], 'tri6c'),
              'tri12c': use(crc['tri12'], 'tri12c'),
              'tri3d': use(usd['tri3'], 'tri3d'),
              'tri6d': use(usd['tri6'], 'tri6d'),
              'tri12d': use(usd['tri12'], 'tri12d'),
          }

          with open('rates.json', 'w') as f:
              json.dump(rates, f, indent=2)

          print("✅ rates.json actualizado")
          PYEOF

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rates.json
          git diff --staged --quiet || git commit -m "update rates $(date -u '+%Y-%m-%d %H:%M')"

          git pull --rebase
          git push
