name: Actualizar tasas de referencia

on:
  schedule:
    # Lunes a viernes 7:00 AM Costa Rica (UTC-6 = 13:00 UTC)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cachear browsers de Playwright para no descargarlos en cada ejecución
      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Instalar dependencias Python
        run: pip install requests playwright beautifulsoup4 lxml --quiet

      - name: Instalar Chromium (solo si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Obtener tasas y actualizar rates.json
        env:
          # Credenciales BCCR opcionales (si el email/token no funcionan, se ignoran)
          BCCR_TOKEN: ${{ secrets.BCCR_TOKEN || '' }}
          BCCR_EMAIL: ${{ secrets.BCCR_EMAIL || '' }}
        run: |
          python3 - << 'PYEOF'
          import requests, json, re, sys, os, time
          from datetime import datetime, UTC
          from xml.etree import ElementTree as ET
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          NOW   = datetime.now(UTC)
          TODAY = NOW.strftime('%d/%m/%Y')
          MONTH = (NOW.replace(day=1)).strftime('%d/%m/%Y')

          BCCR_TOKEN = os.environ.get('BCCR_TOKEN', '').strip()
          BCCR_EMAIL = os.environ.get('BCCR_EMAIL', '').strip()

          H = {'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36'}

          # ── 1. PLAYWRIGHT — renderiza JS, sin auth, igual que un browser ──
          #    Fuente TBP/TED: BCCR Inicio.aspx (muestra valores en HTML tras JS)
          #    Fuente TRI: Cámara de Bancos (tabla renderizada con JS)
          def playwright_get(url, wait_ms=4000):
              """Renderiza una página con JS y devuelve el HTML final."""
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(args=['--no-sandbox', '--disable-dev-shm-usage'])
                      ctx  = browser.new_context(locale='es-CR')
                      page = ctx.new_page()
                      page.goto(url, wait_until='domcontentloaded', timeout=30000)
                      page.wait_for_timeout(wait_ms)   # esperar carga JS
                      html = page.content()
                      browser.close()
                      return html
              except Exception as e:
                  print(f'  ❌ Playwright {url}: {e}', file=sys.stderr)
                  return ''

          def parse_num(txt, lo=0.1, hi=25):
              """Convierte texto a float validando rango."""
              try:
                  v = float(str(txt).strip().replace(',', '.').replace('%', '').replace('\xa0', ''))
                  return round(v, 4) if lo < v < hi else None
              except (ValueError, TypeError):
                  return None

          # ── 2. TBP / TED — BCCR homepage (JS-rendered) ─────────────────
          print('\n→ Playwright: BCCR Inicio (TBP + TED + TC)...')
          tbp = ted = tc_bccr = None
          html_bccr = playwright_get('https://www.bccr.fi.cr/SitePages/Inicio.aspx', wait_ms=5000)
          if html_bccr:
              soup = BeautifulSoup(html_bccr, 'lxml')
              text = soup.get_text(separator=' ')

              # TBP: busca "Tasa Básica Pasiva" seguida de un número
              m = re.search(
                  r'[Tt]asa\s+[Bb][áa]sica\s+[Pp]asiva[^0-9]{0,60}?(\d{1,2}[.,]\d{1,4})',
                  text, re.DOTALL)
              if m:
                  tbp = parse_num(m.group(1))
                  print(f'  ✅ TBP = {tbp}')

              # TED: busca "Tasa Efectiva en Dólares" o "TED"
              m2 = re.search(
                  r'[Tt]asa\s+[Ee]fectiva\s+en\s+[Dd][oó]lares[^0-9]{0,60}?(\d{1,2}[.,]\d{1,4})'
                  r'|TED[^0-9]{0,30}?(\d{1,2}[.,]\d{1,4})',
                  text, re.DOTALL)
              if m2:
                  ted = parse_num(m2.group(1) or m2.group(2))
                  print(f'  ✅ TED = {ted}')

              # TC: busca "Tipo de cambio" + valor 400-900
              m3 = re.search(
                  r'[Tt]ipo\s+de\s+[Cc]ambio[^0-9]{0,80}?(\d{3,4}[.,]\d{0,4})',
                  text, re.DOTALL)
              if m3:
                  v = parse_num(m3.group(1), lo=400, hi=900)
                  if v:
                      tc_bccr = round(v)
                      print(f'  ✅ TC (BCCR) = {tc_bccr}')

              if not any([tbp, ted, tc_bccr]):
                  print('  ⚠ No se encontraron valores en BCCR Inicio.aspx')
                  print('    El HTML tiene', len(html_bccr), 'chars', file=sys.stderr)

          # ── 3. TBP/TED alternativo — BCCR API autenticado (si hay credenciales) ──
          if (tbp is None or ted is None) and BCCR_EMAIL and BCCR_TOKEN:
              print('\n→ BCCR API (fallback con credenciales)...')
              BCCR_URL = (
                  'https://gee.bccr.fi.cr/Indicadores/Suscripciones/WS/'
                  'wsindicadoreseconomicos.asmx/ObtenerIndicadoresEconomicosXML'
              )
              def bccr_api(code, label):
                  try:
                      params = {
                          'Indicador': str(code), 'FechaInicio': MONTH,
                          'FechaFinal': TODAY, 'Nombre': 'CalculadoraCR',
                          'SubNiveles': 'N', 'CorreoElectronico': BCCR_EMAIL,
                          'Token': BCCR_TOKEN,
                      }
                      r = requests.get(BCCR_URL, params=params, headers=H, timeout=20)
                      xml = re.sub(r'\s+xmlns[^"]*"[^"]*"', '', r.text)
                      root = ET.fromstring(xml)
                      vals = []
                      for el in root.iter():
                          tag = el.tag.split('}')[-1]
                          if tag == 'NUM_VALOR' and el.text:
                              try:
                                  v = float(el.text.strip().replace(',', '.'))
                                  if v > 0: vals.append(v)
                              except ValueError: pass
                      if vals:
                          print(f'  ✅ BCCR API {label} = {vals[-1]}')
                          return round(vals[-1], 4)
                      if 'No se encontró' in r.text:
                          print(f'  ❌ BCCR API {label}: email/token no coinciden', file=sys.stderr)
                  except Exception as e:
                      print(f'  ❌ BCCR API {label}: {e}', file=sys.stderr)
                  return None
              if tbp is None: tbp = bccr_api(423, 'TBP')
              if ted is None: ted = bccr_api(23698, 'TED')

          # ── 4. TC — exchangecr.onrender.com (sin auth, confirmado ✅) ─────
          print('\n→ TC: exchangecr.onrender.com...')
          tc = tc_bccr
          try:
              r = requests.get('https://exchangecr.onrender.com/api/tipodecambio',
                               headers=H, timeout=15)
              data = r.json()
              for item in data:
                  divisa = str(item.get('divisa', '')).lower()
                  if 'usd' in divisa or 'dollar' in divisa or 'dolar' in divisa:
                      for key in ['venta', 'sell', 'selling']:
                          if key in item:
                              v = parse_num(item[key], lo=400, hi=900)
                              if v:
                                  tc = round(v)
                                  print(f'  ✅ TC = {tc} (venta USD)')
                                  break
          except Exception as e:
              print(f'  ⚠ TC exchangecr: {e}', file=sys.stderr)

          # ── 5. FRED — Prime Rate + SOFR (sin auth, confirmado ✅) ─────────
          print('\n→ FRED: DPRIME, SOFR90DAYAVG, SOFR180DAYAVG...')
          def fred(sid):
              try:
                  r = requests.get(
                      f'https://fred.stlouisfed.org/graph/fredgraph.csv?id={sid}',
                      headers=H, timeout=20)
                  for line in reversed(r.text.strip().split('\n')[1:]):
                      parts = line.split(',')
                      if len(parts) >= 2 and parts[1].strip() not in ('.', '', 'NA'):
                          v = parse_num(parts[1])
                          if v:
                              print(f'  ✅ FRED {sid} = {v}')
                              return v
              except Exception as e:
                  print(f'  ❌ FRED {sid}: {e}', file=sys.stderr)
              return None

          prime = fred('DPRIME')
          sofr3 = fred('SOFR90DAYAVG')
          sofr6 = fred('SOFR180DAYAVG')

          # ── 6. TRI — Cámara de Bancos con Playwright ─────────────────────
          print('\n→ Playwright: Cámara de Bancos (TRI colones + dólares)...')
          def camara_playwright(url, label):
              html = playwright_get(url, wait_ms=4000)
              if not html:
                  return {'tri3': None, 'tri6': None, 'tri12': None}
              soup = BeautifulSoup(html, 'lxml')
              tri3 = tri6 = tri12 = None

              # Buscar en tablas
              for table in soup.find_all('table'):
                  rows = table.find_all('tr')
                  for i, row in enumerate(rows):
                      cells = [c.get_text(strip=True) for c in row.find_all(['th', 'td'])]
                      rt = ' '.join(cells).lower()
                      if not ('mes' in rt or 'month' in rt):
                          continue
                      col3 = col6 = col12 = -1
                      for j, c in enumerate(cells):
                          cl = c.lower()
                          if re.search(r'\b3\b', cl) and 'mes' in cl: col3  = j
                          if re.search(r'\b6\b', cl) and 'mes' in cl: col6  = j
                          if re.search(r'\b12\b', cl):                col12 = j
                      for dr in rows[i+1:i+6]:
                          dc = [d.get_text(strip=True) for d in dr.find_all('td')]
                          def sg(idx):
                              return parse_num(dc[idx]) if 0 <= idx < len(dc) else None
                          if col3  >= 0 and tri3  is None: tri3  = sg(col3)
                          if col6  >= 0 and tri6  is None: tri6  = sg(col6)
                          if col12 >= 0 and tri12 is None: tri12 = sg(col12)
                          if tri3 and tri6 and tri12: break
                  if tri3 and tri6 and tri12: break

              # Fallback: texto plano
              if not (tri3 and tri6 and tri12):
                  body = soup.get_text(separator=' ')
                  for pat, name in [
                      (r'3\s*mes[^%\d]{0,80}(\d{1,2}[.,]\d{1,4})\s*%', 'tri3'),
                      (r'6\s*mes[^%\d]{0,80}(\d{1,2}[.,]\d{1,4})\s*%', 'tri6'),
                      (r'12\s*mes[^%\d]{0,80}(\d{1,2}[.,]\d{1,4})\s*%', 'tri12'),
                  ]:
                      m = re.search(pat, body, re.IGNORECASE | re.DOTALL)
                      if m:
                          v = parse_num(m.group(1))
                          if name == 'tri3'  and v and tri3  is None: tri3  = v
                          if name == 'tri6'  and v and tri6  is None: tri6  = v
                          if name == 'tri12' and v and tri12 is None: tri12 = v

              if tri3 or tri6 or tri12:
                  print(f'  ✅ TRI {label}: 3M={tri3} 6M={tri6} 12M={tri12}')
              else:
                  print(f'  ⚠ TRI {label}: sin valores en el HTML renderizado', file=sys.stderr)
              return {'tri3': tri3, 'tri6': tri6, 'tri12': tri12}

          crc = camara_playwright('https://camaradebancos.fi.cr/colones/', 'CRC')
          usd = camara_playwright('https://camaradebancos.fi.cr/dolares/', 'USD')

          # ── 7. Cargar rates.json existente (fallback) ─────────────────────
          try:
              with open('rates.json') as f:
                  existing = json.load(f)
              print(f'\nFallback: rates.json existente ({existing.get("updated","?")})')
          except Exception:
              existing = {}

          def use(new_val, key):
              if new_val is not None:
                  try:
                      if float(new_val) > 0: return new_val
                  except (TypeError, ValueError): pass
              old = existing.get(key)
              if old is not None:
                  print(f'  ↩ {key}: usando existente {old}', file=sys.stderr)
              return old

          # ── 8. Construir rates.json ──────────────────────────────────────
          rates = {
              '_comment': 'Auto-actualizado por GitHub Actions. No editar manualmente.',
              'updated':  NOW.strftime('%Y-%m-%dT%H:%M:%SZ'),
              'source':   'BCCR(Playwright) · exchangecr · FRED · Cámara(Playwright)',
              'tbp':    use(tbp,          'tbp'),
              'ted':    use(ted,          'ted'),
              'tc':     use(tc,           'tc'),
              'prime':  use(prime,        'prime'),
              'sofr3':  use(sofr3,        'sofr3'),
              'sofr6':  use(sofr6,        'sofr6'),
              'tri3c':  use(crc['tri3'],  'tri3c'),
              'tri6c':  use(crc['tri6'],  'tri6c'),
              'tri12c': use(crc['tri12'], 'tri12c'),
              'tri3d':  use(usd['tri3'],  'tri3d'),
              'tri6d':  use(usd['tri6'],  'tri6d'),
              'tri12d': use(usd['tri12'], 'tri12d'),
          }

          with open('rates.json', 'w') as f:
              json.dump(rates, f, indent=2, ensure_ascii=False)

          display = {k: v for k, v in rates.items()
                     if not k.startswith('_') and k != 'source'}
          print(f'\n✅ rates.json guardado: {rates["updated"]}')
          print(json.dumps(display, indent=2))
          PYEOF

      - name: Commit y push rates.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git diff --staged --quiet || \
            git commit -m "chore: tasas $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
